<div class="main-container">
    <mat-card class="login-card" appearance="outlined">
        <h1 class="logo-text">
            <span class="text-primary">G</span>
            <span class="text-danger">o</span>
            <span class="text-warning">o</span>
            <span class="text-primary">g</span>
            <span class="text-success">l</span>
            <span class="text-danger">e</span>
        </h1>
        <h2 class="title">Login</h2>
        <p class="subtitle">Use your Google Account</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-container">
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>Email or phone</mat-label>
                    <input matInput formControlName="email">
                </mat-form-field>

                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="password" type="password">
                </mat-form-field>

                <div class="forgot-wrapper">
                    <a class="forgot-link" href="#">forgot Password?</a>
                </div>
            </div>

            <div class="actions-container">
                <a class="create-link" href="javascript:;" (click)="goToRegistration()">Create account</a>
                <button mat-flat-button color="primary" type="submit">Login</button>
            </div>
        </form>
    </mat-card>
</div>
